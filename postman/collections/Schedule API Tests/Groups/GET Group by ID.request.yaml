$kind: http-request
url: "{{baseUrl}}/groups/{{groupId}}"
method: GET
headers:
  Authorization: Bearer_{{token}}
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get('groupId')) {
          console.warn('groupId is not set, skipping.');
          pm.execution.skipRequest();
      }
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });

      pm.test("Returns correct resource", () => {
          const json = pm.response.json();
          const expectedId = parseInt(pm.environment.get("groupId"));
          pm.expect(json.id).to.eql(expectedId);
      });

      pm.test("Response has required fields", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
          pm.expect(json).to.have.property('title');
      });

      pm.test("Response time is less than 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });
    language: text/javascript
order: 3000
