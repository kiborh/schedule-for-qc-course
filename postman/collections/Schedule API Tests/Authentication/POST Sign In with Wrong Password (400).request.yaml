$kind: http-request
url: "{{baseUrl}}/auth/sign-in"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "email": "manager@gmail.com",
        "password": "WrongPassword!999"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 401", () => {
          pm.response.to.have.status(401);
      });

      pm.test("Response does not contain token", () => {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property('token');
      });

      pm.test("Response contains error message", () => {
          const json = pm.response.json();
          pm.expect(json).to.satisfy((body) => {
              return body.hasOwnProperty('message') || body.hasOwnProperty('error') || body.hasOwnProperty('status');
          });
      });

      pm.test("Response time is less than 2000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
order: 2000
