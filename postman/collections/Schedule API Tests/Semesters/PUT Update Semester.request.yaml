$kind: http-request
url: "{{baseUrl}}/semesters"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer_{{token}}
body:
  type: text
  content: |-
    {
        "id": {{semesterId}},
        "description": "{{semesterUpdatedDescription}}",
        "year": 2026,
        "startDay": "01/09/2026",
        "endDay": "31/12/2026",
        "currentSemester": false,
        "defaultSemester": false,
        "semester_days": ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"],
        "semester_classes": [],
        "semester_groups": []
    }
scripts:
  - type: beforeRequest
    code: |-
      if (!pm.environment.get('semesterId')) {
          console.warn('semesterId is not set, skipping.');
          pm.execution.skipRequest();
      }
      const timestamp = Date.now();
      pm.environment.set("semesterUpdatedDescription", "Updated_Semester_" + timestamp);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });

      pm.test("Response contains updated resource", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('id');
          const expectedId = parseInt(pm.environment.get("semesterId"));
          pm.expect(json.id).to.eql(expectedId);
      });

      pm.test("Semester description was updated", () => {
          const json = pm.response.json();
          pm.expect(json.description).to.eql(pm.environment.get("semesterUpdatedDescription"));
      });

      pm.test("Response time is less than 1000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });
    language: text/javascript
order: 4000
